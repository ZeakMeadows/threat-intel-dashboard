<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intelligence Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Threat Intelligence Dashboard</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h5 class="card-title">Total IOCs</h5>
                        <h2 id="total-iocs" class="text-info">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h5 class="card-title">IOC Distribution</h5>
                        <canvas id="typeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h5 class="card-title">Recent IOCs</h5>
                        <table class="table table-dark table-striped">
                            <thead>
                                <tr>
                                    <th>Value</th>
                                    <th>Type</th>
                                    <th>Source</th>
                                    <th>Confidence</th>
                                    <th>First Seen</th>
                                </tr>
                            </thead>
                            <tbody id="iocs-table">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-4 mb-4 text-muted">
        <small>Built by Zeak Meadows</small>
    </footer>

    <script>
        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('total-iocs').textContent = data.total_iocs;
                
                const ctx = document.getElementById('typeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data.by_type),
                        datasets: [{
                            data: Object.values(data.by_type),
                            backgroundColor: ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4']
                        }]
                    }
                });
            });

        fetch('/api/iocs')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('iocs-table');
                data.forEach(ioc => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><code>${ioc.value}</code></td>
                        <td><span class="badge bg-info">${ioc.type}</span></td>
                        <td>${ioc.source}</td>
                        <td>
                            <div class="progress">
                                <div class="progress-bar" style="width: ${ioc.confidence}%">
                                    ${ioc.confidence}%
                                </div>
                            </div>
                        </td>
                        <td>${new Date(ioc.first_seen).toLocaleDateString()}</td>
                    `;
                });
            });
    </script>
</body>
</html>
